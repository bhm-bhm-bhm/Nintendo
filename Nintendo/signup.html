<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N-SHOP | 회원가입</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Outfit:wght@500;800&family=Noto+Sans+KR:wght@400;700&family=Jua&display=swap"
        rel="stylesheet">
</head>

<body>
    <nav class="switch-nav">
        <div class="container nav-container">
            <h1 class="logo"><a href="index.html"><span class="red">N</span>-SHOP</a></h1>
            <ul class="menu">
                <li><a href="index.html#nintendo">닌텐도</a></li>
                <li><a href="index.html#games">스위치 칩</a></li>
                <li><a href="index.html#equipment">장비</a></li>
                <li><a href="reviews.html">리뷰</a></li>
                <li class="has-dropdown">
                    <a href="#">고객 지원</a>
                    <ul class="dropdown-menu">
                        <li><a href="faq.html">자주 묻는 질문</a></li>
                        <li><a href="notices.html">공지사항</a></li>
                        <li><a href="policies.html">교환/반품 안내</a></li>
                        <li><a href="inquiries.html">1:1 문의 내역</a></li>
                    </ul>
                </li>
            </ul>
        </div>
    </nav>

    <main class="auth-wrapper" style="max-width: 600px; margin: 40px auto; padding: 20px;">
        <div class="auth-card"
            style="background: white; border: 5px solid var(--n-dark); border-radius: 20px; padding: 40px; box-shadow: 10px 10px 0 var(--n-dark);">
            <h2 class="auth-title" style="font-size: 2.5rem; text-align: center; margin-bottom: 30px;">Join Us ✨</h2>

            <form class="auth-form" id="signup-form">
                <div class="auth-input-group" style="margin-bottom: 20px;">
                    <label style="display: block; font-weight: 800; margin-bottom: 8px;">아이디</label>
                    <input type="text" id="reg-id" placeholder="6~20자 영문, 숫자 혼합" required
                        style="width: 100%; padding: 12px; border: 3px solid var(--n-dark); border-radius: 12px; outline: none;">
                </div>

                <div class="auth-input-group" style="margin-bottom: 20px;">
                    <label style="display: block; font-weight: 800; margin-bottom: 8px;">비밀번호</label>
                    <input type="password" id="reg-pw" placeholder="8자 이상 새로운 비밀번호 (유니크)" required
                        style="width: 100%; padding: 12px; border: 3px solid var(--n-dark); border-radius: 12px; outline: none;">
                </div>

                <div class="auth-input-group" style="margin-bottom: 20px;">
                    <label style="display: block; font-weight: 800; margin-bottom: 8px;">비밀번호 확인</label>
                    <input type="password" id="reg-pw-confirm" placeholder="비밀번호를 한 번 더 입력하세요" required
                        style="width: 100%; padding: 12px; border: 3px solid var(--n-dark); border-radius: 12px; outline: none;">
                </div>

                <div class="auth-input-group" style="margin-bottom: 20px;">
                    <label style="display: block; font-weight: 800; margin-bottom: 8px;">닉네임 (3~12자)</label>
                    <input type="text" id="reg-name" placeholder="활동할 닉네임을 입력하세요" required
                        style="width: 100%; padding: 12px; border: 3px solid var(--n-dark); border-radius: 12px; outline: none;">
                </div>

                <div class="auth-input-group" style="margin-bottom: 20px;">
                    <label style="display: block; font-weight: 800; margin-bottom: 8px;">휴대폰 번호</label>
                    <input type="tel" id="reg-phone" placeholder="010-0000-0000" required
                        style="width: 100%; padding: 12px; border: 3px solid var(--n-dark); border-radius: 12px; outline: none;">
                </div>

                <div class="auth-input-group" style="margin-bottom: 20px;">
                    <label style="display: block; font-weight: 800; margin-bottom: 8px;">이메일</label>
                    <input type="email" id="reg-email" placeholder="example@n-shop.com" required
                        style="width: 100%; padding: 12px; border: 3px solid var(--n-dark); border-radius: 12px; outline: none;">
                </div>

                <div class="reg-terms" style="margin-bottom: 30px;">
                    <label style="display: block; margin-bottom: 10px; font-weight: 600;">
                        <input type="checkbox" required> [필수] 이용약관 동의
                    </label>
                    <label style="display: block; margin-bottom: 10px; font-weight: 600;">
                        <input type="checkbox" required> [필수] 개인정보 수집 및 이용 동의
                    </label>
                </div>

                <button type="submit" class="auth-btn"
                    style="width: 100%; padding: 15px; background: var(--n-red); color: white; border: 4px solid var(--n-dark); border-radius: 15px; font-size: 1.3rem; font-weight: 800; cursor: pointer; box-shadow: 6px 6px 0 var(--n-dark);">가입하기</button>
            </form>

            <p style="text-align: center; margin-top: 20px;">
                이미 회원이신가요? <a href="login.html" style="color: var(--n-red); font-weight: 800;">로그인 하러가기</a>
            </p>
        </div>
    </main>

    <footer class="footer">
        <div class="container footer-content" style="justify-content: center; text-align: center;">
            <div class="brand">
                <h1 class="logo"><span class="red">N</span>-SHOP</h1>
                <p>&copy; 2026 N-SHOP Korea. All Rights Reserved.</p>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
    <script>
        document.getElementById('signup-form').addEventListener('submit', function (e) {
            e.preventDefault();
            const id = document.getElementById('reg-id').value.trim();
            const pw = document.getElementById('reg-pw').value;
            const pwConfirm = document.getElementById('reg-pw-confirm').value;
            const name = document.getElementById('reg-name').value.trim();
            const phone = document.getElementById('reg-phone').value.trim();
            const email = document.getElementById('reg-email').value.trim();

            if (pw !== pwConfirm) {
                alert('비밀번호가 일치하지 않습니다.');
                return;
            }

            if (name.length < 3 || name.length > 12) {
                alert('닉네임은 3~12자 사이여야 합니다.');
                return;
            }

            // Check if ID already exists
            const users = JSON.parse(localStorage.getItem('nshop_users') || '[]');

            // Uniqueness Checks
            if (users.find(u => u.id === id)) {
                alert('이미 사용 중인 아이디입니다.');
                return;
            }
            if (users.find(u => u.name === name)) {
                alert('이미 사용 중인 닉네임입니다.');
                return;
            }
            if (users.find(u => u.phone === phone)) {
                alert('이미 등록된 휴대폰 번호입니다.');
                return;
            }
            if (users.find(u => u.pw === pw)) {
                alert('보안을 위해 다른 사용자가 이미 사용 중인 비밀번호는 피해주시기 바랍니다.');
                return;
            }

            users.push({
                id,
                pw,
                name,
                phone,
                email,
                lastNicknameChange: new Date().toISOString()
            });
            localStorage.setItem('nshop_users', JSON.stringify(users));
            alert('🎉 회원가입이 완료되었습니다! 로그인 페이지로 이동합니다.');
            location.href = 'login.html';
        });
    </script>
</body>

</html>
