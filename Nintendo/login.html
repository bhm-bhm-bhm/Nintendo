<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N-SHOP | 로그인</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Outfit:wght@500;800&family=Noto+Sans+KR:wght@400;700&family=Jua&display=swap"
        rel="stylesheet">
</head>

<body>
    <nav class="switch-nav">
        <div class="container nav-container">
            <h1 class="logo"><a href="index.html"><span class="red">N</span>-SHOP</a></h1>

        </div>
    </nav>

    <main class="auth-wrapper">
        <div class="auth-card">
            <h2 class="auth-title">Welcome 🎮</h2>

            <form class="auth-form" id="login-form">
                <div class="auth-input-group">
                    <label>아이디</label>
                    <input type="text" id="login-id" placeholder="아이디를 입력하세요" required>
                </div>

                <div class="auth-input-group">
                    <label>비밀번호</label>
                    <input type="password" id="login-pw" placeholder="비밀번호를 입력하세요" required>
                </div>

                <div class="auth-options">
                    <label class="remember-me">
                        <input type="checkbox" id="auto-login-check"> 자동 로그인
                    </label>
                    <div class="find-links">
                        <a href="find-account.html">아이디 찾기</a>
                        <a href="find-account.html">비밀번호 찾기</a>
                    </div>
                </div>

                <button type="submit" class="auth-btn">로그인</button>
            </form>

            <div class="social-login">
                <span class="social-title">간편 로그인</span>
                <div class="social-icons">
                    <div class="social-btn" title="카카오 로그인">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/e/e3/KakaoTalk_logo.svg" alt="Kakao">
                    </div>
                    <div class="social-btn" title="네이버 로그인">
                        <img src="간편 로그인 image/naver.svg" alt="Naver" style="width: 40px;">
                    </div>
                    <div class="social-btn" title="구글 로그인">
                        <img src="간편 로그인 image/google.png" alt="Google" style="width: 32px; border-radius: 50%;">
                    </div>
                </div>
            </div>

            <p class="signup-prompt">
                아직 회원이 아니신가요? <a href="signup.html">회원가입 하기</a>
            </p>
        </div>
    </main>

    <footer class="footer">
        <div class="container footer-content" style="justify-content: center; text-align: center;">
            <div class="brand">
                <h1 class="logo"><span class="red">N</span>-SHOP</h1>
                <p>&copy; 2026 N-SHOP Korea. All Rights Reserved.</p>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
    <script>
        // Auto-login: if saved credentials exist, log in automatically
        (function () {
            const saved = JSON.parse(localStorage.getItem('nshop_auto_login') || 'null');
            if (saved) {
                const users = JSON.parse(localStorage.getItem('nshop_users') || '[]');
                const user = users.find(u => u.id === saved.id && u.pw === saved.pw);
                if (user) {
                    localStorage.setItem('nshop_logged_in', JSON.stringify({ id: user.id, name: user.name }));
                    location.href = 'mypage.html';
                    return;
                }
            }
            // Also redirect if already logged in
            if (localStorage.getItem('nshop_logged_in')) {
                location.href = 'mypage.html';
            }
        })();

        document.getElementById('login-form').addEventListener('submit', function (e) {
            e.preventDefault();
            const id = document.getElementById('login-id').value.trim();
            const pw = document.getElementById('login-pw').value;
            const autoLogin = document.getElementById('auto-login-check').checked;

            const users = JSON.parse(localStorage.getItem('nshop_users') || '[]');
            const user = users.find(u => u.id === id && u.pw === pw);

            if (user) {
                localStorage.setItem('nshop_logged_in', JSON.stringify({ id: user.id, name: user.name }));
                if (autoLogin) {
                    localStorage.setItem('nshop_auto_login', JSON.stringify({ id, pw }));
                }
                location.href = 'mypage.html';
            } else {
                alert('아이디 또는 비밀번호가 일치하지 않습니다.\n회원이 아니시라면 먼저 회원가입을 해주세요.');
            }
        });
    </script>
</body>

</html>
