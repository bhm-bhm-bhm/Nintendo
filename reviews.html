<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N-SHOP | 리뷰</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Outfit:wght@500;800&family=Noto+Sans+KR:wght@400;700&family=Jua&display=swap"
        rel="stylesheet">
</head>

<body>
    <nav class="switch-nav">
        <div class="container nav-container">
            <h1 class="logo"><a href="index.html"><span class="red">N</span>-SHOP</a></h1>
            <ul class="menu">
                <li><a href="index.html#nintendo">닌텐도</a></li>
                <li><a href="index.html#games">스위치 칩</a></li>
                <li><a href="index.html#equipment">장비</a></li>
                <li><a href="reviews.html">리뷰</a></li>
                <li class="has-dropdown">
                    <a href="#">고객 지원</a>
                    <ul class="dropdown-menu">
                        <li><a href="faq.html">자주 묻는 질문</a></li>
                        <li><a href="notices.html">공지사항</a></li>
                        <li><a href="policies.html">교환/반품 안내</a></li>
                        <li><a href="inquiries.html">1:1 문의 내역</a></li>
                    </ul>
                </li>
            </ul>
            <div class="nav-actions">
                <div class="nav-icons">
                    <a href="search.html" class="icon-btn" aria-label="검색">
                        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2.5"
                            fill="none" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" cy="21" x2="16.65" y2="16.65"></line>
                        </svg>
                    </a>
                    <a href="login.html" class="icon-btn profile-btn" aria-label="마이페이지">
                        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2.5"
                            fill="none" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                    </a>
                    <a href="cart.html" class="icon-btn cart-btn" aria-label="장바구니">
                        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2.5"
                            fill="none" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="9" cy="21" r="1"></circle>
                            <circle cx="20" cy="21" r="1"></circle>
                            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                        </svg>
                        <span class="cart-count" id="cart-counter">0</span>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <main class="container page-content">
        <h2 class="page-title">리뷰 ⭐</h2>

        <!-- Reviews List (Now at the TOP) -->
        <div class="reviews-list-section" style="margin-bottom: 60px;">
            <h3 class="review-section-title">📖 최근 리뷰</h3>

            <!-- Category Tabs -->
            <div class="review-filter-tabs">
                <button class="filter-tab active" data-category="all">전체</button>
                <button class="filter-tab" data-category="닌텐도">닌텐도</button>
                <button class="filter-tab" data-category="스위치 칩">스위치 칩</button>
                <button class="filter-tab" data-category="장비">장비</button>
            </div>

            <div class="review-slider-wrapper">
                <button class="slider-nav-btn slider-prev" id="slider-prev">❮</button>
                <div id="reviews-list" class="reviews-slider">
                    <!-- Dynamically populated -->
                </div>
                <button class="slider-nav-btn slider-next" id="slider-next">❯</button>
            </div>
        </div>

        <!-- Write Review Section (Now at the BOTTOM) -->
        <div class="review-write-card" id="review-write-container">
            <h3 class="review-section-title">✍️ 리뷰 작성하기</h3>
            <div id="login-required-msg" style="display: none; text-align: center; padding: 20px;">
                <p style="font-size: 1.1rem; color: #666; margin-bottom: 20px;">리뷰를 작성하려면 로그인이 필요합니다.</p>
                <button onclick="showPhoneLoginModal()" class="auth-btn"
                    style="max-width: 200px; margin: 0 auto;">로그인하기</button>
            </div>
            <form id="review-form">
                <div class="review-form-row">
                    <div class="review-form-group">
                        <label>제품 선택</label>
                        <select id="review-game" required>
                            <option value="">-- 보유한 제품을 선택하세요 --</option>
                        </select>
                    </div>
                    <div class="review-form-group">
                        <label>별점</label>
                        <div class="star-rating" id="star-rating">
                            <span class="star" data-value="1">★</span>
                            <span class="star" data-value="2">★</span>
                            <span class="star" data-value="3">★</span>
                            <span class="star" data-value="4">★</span>
                            <span class="star" data-value="5">★</span>
                        </div>
                        <input type="hidden" id="review-rating" value="0">
                    </div>
                </div>
                <!-- Image Upload Field -->
                <div class="review-form-group">
                    <label>사진 첨부 <span style="font-size:0.8rem;color:var(--n-red);font-weight:700">(필수
                            1장)</span></label>
                    <input type="file" id="review-image" accept="image/*" required>
                    <div id="image-preview" style="margin-top:10px; display:none;">
                        <img id="preview-img" src=""
                            style="max-width:200px; border-radius:12px; border:3px solid var(--n-dark);">
                    </div>
                </div>
                <div class="review-form-group">
                    <label>한 줄 제목</label>
                    <input type="text" id="review-title" placeholder="리뷰 제목을 입력하세요" required>
                </div>
                <div class="review-form-group">
                    <label>상세 리뷰 <span style="font-size:0.8rem;color:#999;font-weight:400">(최소 30자 이상)</span></label>
                    <textarea id="review-content" placeholder="제품에 대한 솔직한 리뷰를 작성해 주세요! (30자 미만 작성 시 등록 불가)" rows="5"
                        minlength="30" required></textarea>
                    <div id="char-counter"
                        style="text-align: right; font-size: 0.85rem; color: #999; margin-top: 5px; font-weight: 600;">0
                        / 30자</div>
                </div>
                <button type="submit" class="review-submit-btn"
                    style="background: var(--n-blue); color: var(--n-dark); box-shadow: 6px 6px 0 var(--n-dark);">리뷰
                    등록</button>
            </form>
        </div>
    </main>

    <footer id="contact" class="footer">
        <div class="container footer-content">
            <div class="brand">
                <h1 class="logo"><span class="red">N</span>-SHOP</h1>
                <p>최고의 게임 경험을 위한 프리미엄 기어샵입니다.<br>항상 혁신적이고 품질 높은 액세서리를 제공합니다.</p>
            </div>
        </div>
        <div class="copyright">
            &copy; 2026 N-SHOP Korea. All Rights Reserved.
        </div>
    </footer>

    <div id="toast-container"></div>
    <script src="script.js"></script>
    <script>
        // Check Login and Ownership - RESTRICTIONS RE-ENABLED
        const loggedIn = JSON.parse(localStorage.getItem('nshop_logged_in'));
        const reviewForm = document.getElementById('review-form');
        const loginMsg = document.getElementById('login-required-msg');

        if (!loggedIn) {
            reviewForm.style.display = 'none';
            loginMsg.style.display = 'block';
        }

        // Populate product select dropdown - ONLY purchased products
        const productSelect = document.getElementById('review-game');
        const cartItems = JSON.parse(localStorage.getItem('nshop_cart') || '[]');
        const purchasedNames = cartItems.map(item => item.name);

        let hasPurchasedProducts = false;
        productsData.forEach(p => {
            if (purchasedNames.includes(p.name)) {
                const opt = document.createElement('option');
                opt.value = p.name;
                opt.textContent = `[${p.category}] ${p.name}`;
                productSelect.appendChild(opt);
                hasPurchasedProducts = true;
            }
        });

        if (!hasPurchasedProducts && loggedIn) {
            const opt = document.createElement('option');
            opt.value = "";
            opt.textContent = "보유한 제품이 없습니다 (구매 후 작성 가능)";
            opt.disabled = true;
            productSelect.appendChild(opt);
        }

        // Image Preview Logic
        const imageInput = document.getElementById('review-image');
        const imagePreview = document.getElementById('image-preview');
        const previewImg = document.getElementById('preview-img');
        let selectedImageBase64 = "";

        imageInput.addEventListener('change', function () {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function (e) {
                    selectedImageBase64 = e.target.result;
                    previewImg.src = selectedImageBase64;
                    imagePreview.style.display = 'block';
                }
                reader.readAsDataURL(file);
            } else {
                selectedImageBase64 = "";
                imagePreview.style.display = 'none';
            }
        });

        // Live Character Counter
        const reviewTextarea = document.getElementById('review-content');
        const charCounter = document.getElementById('char-counter');
        reviewTextarea.addEventListener('input', () => {
            const length = reviewTextarea.value.length;
            charCounter.textContent = `${length} / 30자`;
            charCounter.style.color = length >= 30 ? 'var(--n-red)' : '#999';
        });

        // Star rating interaction
        let selectedRating = 0;
        const stars = document.querySelectorAll('.star');
        stars.forEach(star => {
            star.addEventListener('click', () => {
                selectedRating = parseInt(star.dataset.value);
                document.getElementById('review-rating').value = selectedRating;
                updateStars();
            });
            star.addEventListener('mouseenter', () => {
                highlightStars(parseInt(star.dataset.value));
            });
        });
        document.getElementById('star-rating').addEventListener('mouseleave', () => {
            highlightStars(selectedRating);
        });

        function highlightStars(count) {
            stars.forEach(s => {
                s.classList.toggle('active', parseInt(s.dataset.value) <= count);
            });
        }
        function updateStars() {
            highlightStars(selectedRating);
        }

        // --- FILTER & SLIDER LOGIC ---
        let currentFilter = 'all';

        // Tab click handling
        document.querySelectorAll('.filter-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentFilter = tab.dataset.category;
                loadReviews(currentFilter);
            });
        });

        // Slider Navigation
        const slider = document.getElementById('reviews-list');
        document.getElementById('slider-prev').onclick = () => slider.scrollLeft -= 350;
        document.getElementById('slider-next').onclick = () => slider.scrollLeft += 350;

        // Load existing reviews with filter
        function loadReviews(filter = 'all') {
            const reviews = JSON.parse(localStorage.getItem('nshop_reviews') || '[]');
            const container = document.getElementById('reviews-list');
            const currentUser = JSON.parse(localStorage.getItem('nshop_logged_in') || '{}');

            // Add category to reviews for filtering (mapping from productsData)
            const filteredReviews = reviews.filter(r => {
                const product = productsData.find(p => p.name === r.game);
                const category = product ? product.category : '기타';
                return filter === 'all' || category === filter;
            });

            if (filteredReviews.length === 0) {
                container.innerHTML = '<div class="no-reviews" style="flex:1; text-align:center; padding:50px;">해당 카테고리에 등록된 리뷰가 없습니다. 🎮</div>';
                return;
            }

            container.innerHTML = filteredReviews.slice().reverse().map((r, i) => {
                // Find original index in full reviews list for delete/edit
                const actualIndex = reviews.findIndex(originR => originR === r);
                const isAuthor = r.authorId === currentUser.id;

                return `
                <div class="review-card slider-item" id="review-${actualIndex}">
                    <div class="review-card-header">
                        <div class="review-meta">
                            <strong class="review-game-name">${r.game}</strong>
                            <div class="review-stars">${'★'.repeat(r.rating)}${'☆'.repeat(5 - r.rating)}</div>
                        </div>
                        <div class="review-info">
                            <span class="review-author">👤 ${r.author}</span>
                            <span class="review-date">${r.date}</span>
                        </div>
                    </div>
                    <div class="review-body" style="height: 300px; overflow-y: auto;">
                        <h4 class="review-card-title">${r.title}</h4>
                        ${r.image ? `<img src="${r.image}" style="width:100%; border-radius:15px; border:2px solid var(--n-dark); margin: 15px 0; object-fit: cover; height: 150px;">` : ''}
                        <p class="review-card-content">${r.content}</p>
                    </div>
                    ${isAuthor ? `
                    <div class="review-card-actions" style="margin-top: 15px;">
                        <button class="review-btn-edit" onclick="showEditForm(${actualIndex})">수정</button>
                        <button class="review-delete-btn" style="position:static;" onclick="deleteReview(${actualIndex})">삭제</button>
                    </div>
                    ` : ''}
                </div>
                `;
            }).join('');

            // Re-scroll to start when filter changes
            slider.scrollLeft = 0;
        }

        // Submit review
        document.getElementById('review-form').addEventListener('submit', function (e) {
            e.preventDefault();
            if (!loggedIn) {
                showPhoneLoginModal();
                return;
            }

            const product = document.getElementById('review-game').value;
            if (!product) {
                alert('리뷰할 제품을 선택해주세요.');
                return;
            }

            if (selectedRating === 0) {
                alert('별점을 선택해 주세요!');
                return;
            }

            if (!selectedImageBase64) {
                alert('리뷰 사진을 최소 1장 첨부해 주세요!');
                return;
            }

            const content = reviewTextarea.value;
            if (content.length < 30) {
                alert('상세 리뷰는 최소 30자 이상 작성해야 합니다.');
                return;
            }

            const review = {
                game: product,
                rating: selectedRating,
                title: document.getElementById('review-title').value,
                content: content,
                image: selectedImageBase64,
                author: loggedIn.name,
                authorId: loggedIn.id,
                date: new Date().toLocaleDateString('ko-KR')
            };

            const reviews = JSON.parse(localStorage.getItem('nshop_reviews') || '[]');
            reviews.push(review);
            localStorage.setItem('nshop_reviews', JSON.stringify(reviews));

            // Reset form
            this.reset();
            selectedRating = 0;
            selectedImageBase64 = "";
            imagePreview.style.display = 'none';
            updateStars();
            loadReviews(currentFilter);
            charCounter.textContent = "0 / 30자";
            charCounter.style.color = "#999";

            // Gamified feedback
            showToast('✅ 리뷰가 등록되었습니다! (+5 XP 획득)', 'toast-xp');
        });

        // Edit/Delete functions
        function showEditForm(index) {
            const reviews = JSON.parse(localStorage.getItem('nshop_reviews') || '[]');
            const review = reviews[index];
            const card = document.getElementById(`review-${index}`);

            if (card.querySelector('.edit-form-card')) return;

            const editFormHtml = `
                <div class="edit-form-card" style="padding: 10px; background: #f9f9f9; border-radius: 10px; margin-top: 10px;">
                    <h4 style="margin-bottom:10px; font-size: 0.9rem;">✏️ 리뷰 수정</h4>
                    <input type="text" id="edit-title-${index}" value="${review.title}" style="width:100%; margin-bottom: 5px; padding: 5px;">
                    <textarea id="edit-content-${index}" rows="3" style="width:100%; padding: 5px;">${review.content}</textarea>
                    <div style="display:flex; gap:5px; margin-top:10px;">
                        <button class="review-submit-btn" style="padding: 5px 10px; font-size: 0.8rem;" onclick="saveEdit(${index})">저장</button>
                        <button class="review-btn-edit" style="padding: 5px 10px; font-size: 0.8rem;" onclick="loadReviews(currentFilter)">취소</button>
                    </div>
                </div>
            `;

            card.querySelector('.review-body').style.display = 'none';
            card.querySelector('.review-card-actions').style.display = 'none';
            card.insertAdjacentHTML('beforeend', editFormHtml);
        }

        function saveEdit(index) {
            const title = document.getElementById(`edit-title-${index}`).value;
            const content = document.getElementById(`edit-content-${index}`).value;

            if (content.length < 30) {
                alert('상세 리뷰는 최소 30자 이상이어야 합니다.');
                return;
            }

            const reviews = JSON.parse(localStorage.getItem('nshop_reviews') || '[]');
            reviews[index].title = title;
            reviews[index].content = content;
            reviews[index].date = new Date().toLocaleDateString('ko-KR') + " (수정됨)";

            localStorage.setItem('nshop_reviews', JSON.stringify(reviews));
            showToast('✅ 리뷰가 수정되었습니다!');
            loadReviews(currentFilter);
        }

        function deleteReview(index) {
            if (!confirm('정말 삭제하시겠습니까?')) return;
            const reviews = JSON.parse(localStorage.getItem('nshop_reviews') || '[]');
            reviews.splice(index, 1);
            localStorage.setItem('nshop_reviews', JSON.stringify(reviews));
            loadReviews(currentFilter);
            showToast('🗑️ 리뷰가 삭제되었습니다.');
        }

        loadReviews();
    </script>
    <button class="floating-inquiry inquiry-trigger" aria-label="실시간 문의">
        <span class="inquiry-icon">💭</span>
        <span class="inquiry-text">문의하기</span>
    </button>
</body>

</html>
