<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N-SHOP | 회원가입</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Outfit:wght@500;800&family=Noto+Sans+KR:wght@400;700&family=Jua&display=swap"
        rel="stylesheet">
</head>

<body>
    <nav class="switch-nav">
        <div class="container nav-container">
            <h1 class="logo"><a href="index.html"><span class="red">N</span>-SHOP</a></h1>
            <ul class="menu">
                <li><a href="index.html#nintendo">닌텐도</a></li>
                <li><a href="index.html#games">스위치 칩</a></li>
                <li><a href="index.html#equipment">장비</a></li>
                <li><a href="reviews.html">리뷰</a></li>
            </ul>
        </div>
    </nav>

    <main class="auth-wrapper" style="max-width: 600px;">
        <div class="auth-card">
            <h2 class="auth-title">Join Us ✨</h2>

            <form class="auth-form" id="signup-form">
                <div class="auth-input-group">
                    <label>아이디</label>
                    <input type="text" id="reg-id" placeholder="6~20자 영문, 숫자 혼합" required>
                </div>

                <div class="auth-input-group">
                    <label>비밀번호</label>
                    <input type="password" id="reg-pw" placeholder="8자 이상 영문, 숫자, 특수문자 포함" required>
                </div>

                <div class="auth-input-group">
                    <label>비밀번호 확인</label>
                    <input type="password" id="reg-pw-confirm" placeholder="비밀번호를 한 번 더 입력하세요" required>
                </div>

                <div class="auth-input-group">
                    <label>이름</label>
                    <input type="text" id="reg-name" placeholder="실명을 입력하세요" required>
                </div>

                <div class="auth-input-group">
                    <label>이메일</label>
                    <input type="email" id="reg-email" placeholder="example@n-shop.com" required>
                </div>

                <div class="reg-terms">
                    <label class="term-item">
                        <input type="checkbox" required> [필수] 이용약관 동의
                    </label>
                    <label class="term-item">
                        <input type="checkbox" required> [필수] 개인정보 수집 및 이용 동의
                    </label>
                    <label class="term-item">
                        <input type="checkbox"> [선택] 마케팅 정보 수신 동의
                    </label>
                </div>

                <button type="submit" class="auth-btn">가입하기</button>
            </form>

            <p class="signup-prompt">
                이미 회원이신가요? <a href="login.html">로그인 하러가기</a>
            </p>
        </div>
    </main>

    <footer class="footer">
        <div class="container footer-content" style="justify-content: center; text-align: center;">
            <div class="brand">
                <h1 class="logo"><span class="red">N</span>-SHOP</h1>
                <p>&copy; 2026 N-SHOP Korea. All Rights Reserved.</p>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
    <script>
        document.getElementById('signup-form').addEventListener('submit', function (e) {
            e.preventDefault();
            const id = document.getElementById('reg-id').value.trim();
            const pw = document.getElementById('reg-pw').value;
            const pwConfirm = document.getElementById('reg-pw-confirm').value;
            const name = document.getElementById('reg-name').value.trim();
            const email = document.getElementById('reg-email').value.trim();

            if (pw !== pwConfirm) {
                alert('비밀번호가 일치하지 않습니다.');
                return;
            }

            // Check if ID already exists
            const users = JSON.parse(localStorage.getItem('nshop_users') || '[]');
            if (users.find(u => u.id === id)) {
                alert('이미 사용 중인 아이디입니다.');
                return;
            }

            users.push({ id, pw, name, email });
            localStorage.setItem('nshop_users', JSON.stringify(users));
            alert('🎉 회원가입이 완료되었습니다! 로그인 페이지로 이동합니다.');
            location.href = 'login.html';
        });
    </script>
</body>

</html>
