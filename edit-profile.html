    <main class="container page-content">
        <div class="edit-profile-wrapper" style="max-width:800px; margin: 0 auto;">
            <h2 class="page-title">회원정보 수정 🛠️</h2>

            <div class="edit-card">
                <form class="profile-edit-form" id="edit-profile-form">
                    <div class="profile-avatar-section">
                        <div class="avatar-preview">
                            <img id="edit-avatar-img" src="https://api.dicebear.com/7.x/pixel-art/svg?seed=Mario"
                                alt="Profile">
                            <button type="button" class="avatar-edit-badge">📸</button>
                        </div>
                        <p class="avatar-hint">프로필 이미지는 닉네임에 맞춰 자동 생성됩니다.</p>
                    </div>

                    <div class="form-grid">
                        <div class="form-group">
                            <label>닉네임 <span style="font-size:0.8rem; color:#999;">(3~12자, 3달마다 변경 가능)</span></label>
                            <input type="text" id="edit-nickname" placeholder="닉네임을 입력하세요" required>
                            <p id="nickname-timer"
                                style="font-size:0.8rem; color:var(--n-red); margin-top:5px; display:none;"></p>
                        </div>

                        <div class="form-group">
                            <label>휴대폰 번호 <span style="font-size:0.8rem; color:#999;">(중복 불가)</span></label>
                            <input type="tel" id="edit-phone" placeholder="010-0000-0000" required>
                        </div>

                        <div class="form-group full-width">
                            <label>이메일 (변경 불가)</label>
                            <input type="email" id="edit-email" disabled
                                style="background-color: #f0f0f0; cursor: not-allowed; border: 3px solid #ccc;">
                        </div>

                        <div class="form-divider"
                            style="margin: 30px 0 20px; font-weight: 800; border-bottom: 3px solid var(--n-dark); padding-bottom:10px;">
                            비밀번호 변경</div>

                        <div class="form-group">
                            <label>현재 비밀번호</label>
                            <input type="password" id="current-pw" placeholder="기존 비밀번호 입력">
                        </div>

                        <div class="form-group">
                            <label>새 비밀번호 <span style="font-size:0.8rem; color:#999;">(비밀번호 중복 불가)</span></label>
                            <input type="password" id="new-pw" placeholder="새로운 비밀번호 입력">
                        </div>

                        <div class="form-group">
                            <label>새 비밀번호 확인</label>
                            <input type="password" id="new-pw-confirm" placeholder="새로운 비밀번호 다시 입력">
                        </div>
                    </div>

                    <div class="form-actions" style="margin-top: 40px; display: flex; gap: 15px;">
                        <button type="button" class="cancel-btn" onclick="location.href='mypage.html'"
                            style="flex:1;">취소</button>
                        <button type="submit" class="save-btn"
                            style="flex:1; background: var(--n-red); color:white; border:4px solid var(--n-dark); border-radius:15px; font-size:1.3rem; padding:15px; font-weight:800; cursor:pointer; box-shadow: 6px 6px 0 var(--n-dark);">변경사항
                            저장</button>
                    </div>
                </form>
            </div>
        </div>

    <div id="toast-container"></div>
    <script src="script.js"></script>
    <script>
        const loggedInUser = JSON.parse(localStorage.getItem('nshop_logged_in'));
        if (!loggedInUser) {
            alert('로그인이 필요합니다.');
            location.href = 'login.html';
        }

        const users = JSON.parse(localStorage.getItem('nshop_users') || '[]');
        const userIndex = users.findIndex(u => u.id === loggedInUser.id);
        const currentUser = users[userIndex];

        // UI Elements
        const nicknameInput = document.getElementById('edit-nickname');
        const phoneInput = document.getElementById('edit-phone');
        const emailInput = document.getElementById('edit-email');
        const avatarImg = document.getElementById('edit-avatar-img');
        const nicknameTimer = document.getElementById('nickname-timer');

        // Initial Data Load
        nicknameInput.value = currentUser.name || ''; // name is used as nickname
        phoneInput.value = currentUser.phone || '';
        emailInput.value = currentUser.email || '';
        if (currentUser.name) {
            avatarImg.src = `https://api.dicebear.com/7.x/pixel-art/svg?seed=${currentUser.name}`;
        }

        // Nickname change limit check (3 months = 90 days)
        let canChangeNickname = true;
        if (currentUser.lastNicknameChange) {
            const lastChange = new Date(currentUser.lastNicknameChange);
            const now = new Date();
            const diffDays = Math.floor((now - lastChange) / (1000 * 60 * 60 * 24));
            const remainingDays = 90 - diffDays;

            if (remainingDays > 0) {
                canChangeNickname = false;
                nicknameInput.disabled = true;
                nicknameTimer.textContent = `⚠️ 닉네임은 ${remainingDays}일 후에 다시 변경할 수 있습니다.`;
                nicknameTimer.style.display = 'block';
                nicknameInput.style.backgroundColor = '#f0f0f0';
                nicknameInput.style.cursor = 'not-allowed';
            }
        }

        nicknameInput.addEventListener('input', (e) => {
            const val = e.target.value;
            if (val.length >= 3) {
                avatarImg.src = `https://api.dicebear.com/7.x/pixel-art/svg?seed=${val}`;
            }
        });

        document.getElementById('edit-profile-form').addEventListener('submit', function (e) {
            e.preventDefault();

            const newNickname = nicknameInput.value.trim();
            const newPhone = phoneInput.value.trim();
            const currentPwInput = document.getElementById('current-pw').value;
            const newPw = document.getElementById('new-pw').value;
            const newPwConfirm = document.getElementById('new-pw-confirm').value;

            // 1. Nickname Length Validation
            if (newNickname.length < 3 || newNickname.length > 12) {
                alert('닉네임은 3자에서 12자 사이여야 합니다.');
                return;
            }

            // 2. Uniqueness Checks
            const otherUsers = users.filter(u => u.id !== currentUser.id);

            // Nickname uniqueness (if changed)
            if (newNickname !== currentUser.name && otherUsers.some(u => u.name === newNickname)) {
                alert('이미 사용 중인 닉네임입니다.');
                return;
            }

            // Phone uniqueness (if changed)
            if (newPhone !== currentUser.phone && otherUsers.some(u => u.phone === newPhone)) {
                alert('이미 등록된 휴대폰 번호입니다.');
                return;
            }

            // Password uniqueness (among ALL active passwords of other users)
            if (newPw && otherUsers.some(u => u.pw === newPw)) {
                alert('보안을 위해 다른 사용자가 사용 중인 비밀번호는 사용할 수 없습니다.');
                return;
            }

            // 3. Password Change Logic
            let updatedPw = currentUser.pw;
            if (newPw) {
                if (currentPwInput !== currentUser.pw) {
                    alert('현재 비밀번호가 일치하지 않습니다.');
                    return;
                }
                if (newPw !== newPwConfirm) {
                    alert('새 비밀번호와 확인이 일치하지 않습니다.');
                    return;
                }
                updatedPw = newPw;
            }

            // 4. Update User Object
            if (newNickname !== currentUser.name) {
                currentUser.lastNicknameChange = new Date().toISOString();
                currentUser.name = newNickname;
            }
            currentUser.phone = newPhone;
            currentUser.pw = updatedPw;

            // Save to LocalStorage
            users[userIndex] = currentUser;
            localStorage.setItem('nshop_users', JSON.stringify(users));

            // Sync current session
            localStorage.setItem('nshop_logged_in', JSON.stringify(currentUser));

            showToast('✅ 회원정보가 성공적으로 수정되었습니다!', 'toast-xp');

            setTimeout(() => {
                location.href = 'mypage.html';
            }, 1500);
        });
    </script>
